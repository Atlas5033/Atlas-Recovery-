<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas Recovery — Coming Soon</title>
  <meta name="description" content="Atlas Recovery — Addiction Medicine & Psychiatry. Serving all of Colorado." />
  <meta name="theme-color" content="#0f172a" />
  <meta property="og:title" content="Atlas Recovery" />
  <meta property="og:description" content="Addiction Medicine & Psychiatry. Serving all of Colorado." />
  <meta property="og:type" content="website" />
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root {
      --bg: #0b1020;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --card: rgba(255,255,255,0.06);
      --shadow: 0 10px 30px rgba(2,6,23,0.45);
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #f8fafc; --fg: #0f172a; --muted: #475569; --card: rgba(15,23,42,0.06);}  
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 70% -10%, rgba(96,165,250,.25), transparent),
                  radial-gradient(1000px 700px at -10% 110%, rgba(16,185,129,.20), transparent),
                  var(--bg);
      color: var(--fg);
      display: grid;
      place-items: center;
      padding: 2rem; 
    }
    .card {
      width: min(880px, 92vw);
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 24px;
      padding: clamp(1.5rem, 4vw, 3rem);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .logo {
      width: clamp(280px, 45vw, 400px);
      height: auto;
      display: block;
      margin: 0 auto 1.5rem auto;
      filter: drop-shadow(0 6px 18px rgba(2,6,23,0.25));
    }
    h1 { font-size: clamp(1.5rem, 3vw, 2rem); margin: 0.25rem 0; letter-spacing: 0.2px; }
    .tag { font-size: 1rem; color: var(--muted); margin: 0.75rem 0 1.25rem; }
    .coming {
      display: inline-flex; align-items: center; gap: .5rem;
      font-weight: 600; letter-spacing: .5px; padding: .6rem 1rem;
      border-radius: 999px; border: 1px dashed rgba(148,163,184,.35);
      background: rgba(148,163,184,.10);
      margin-top: 1rem;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px rgba(96,165,250,.15); }
    .pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .9 }
      50% { transform: scale(1.4); opacity: .5 }
    }
    footer { margin-top: 1.25rem; font-size: .85rem; color: var(--muted); }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(148,163,184,.35), transparent); margin: 1.25rem 0; }
  </style>
</head>
<body>
  <main class="card" role="main">
    <img class="logo" src="Atlas_Recovery_Logo.png" alt="Atlas Recovery logo" />

    <div class="coming" aria-live="polite">
      <span class="dot pulse" aria-hidden="true"></span>
      <span>Coming Soon</span>
    </div>

    <p class="tag">Addiction Medicine & Psychiatry · Serving all of Colorado</p>

    <footer>
      <span class="sr-only">Copyright</span>
      <small>© <span id="year"></span> Atlas Recovery. All rights reserved.</small>
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <noscript>This site looks better with JavaScript enabled.</noscript>
</body>
</html>
